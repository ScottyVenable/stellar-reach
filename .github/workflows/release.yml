name: Build and Release

# Builds the PWA on every push and pull request, then publishes a GitHub
# Release containing the production bundle for every PR. The release tag is
# derived from the PR number and the head commit SHA so each PR has its own
# stable, downloadable build.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write   # required to create releases and upload assets

concurrency:
  group: release-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      bundle-name: ${{ steps.bundle.outputs.bundle-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_BASE: './'

      - name: Package bundle
        id: bundle
        run: |
          set -euo pipefail
          NAME="stellar-reach-${GITHUB_SHA::8}.zip"
          ( cd dist && zip -r "../$NAME" . )
          echo "bundle-name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: stellar-reach-bundle
          path: ${{ steps.bundle.outputs.bundle-name }}
          if-no-files-found: error

  release-pr:
    # Publishes a "PR build" release on every pull request from this repo.
    # Forks cannot create releases (no write token), so we skip them.
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Download bundle
        uses: actions/download-artifact@v4.1.7
        with:
          name: stellar-reach-bundle
          path: ./bundle

      - name: Compute release metadata
        id: meta
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          SHORT="${HEAD_SHA::8}"
          TAG="pr-${PR_NUMBER}-${SHORT}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=Stellar Reach PR #${PR_NUMBER} (${SHORT})" >> "$GITHUB_OUTPUT"
          {
            echo 'body<<EOF'
            echo "PR: #${PR_NUMBER} - ${PR_TITLE}"
            echo "Commit: ${HEAD_SHA}"
            echo
            echo "Download the attached zip and serve it as a static site (or open index.html directly via http) to play this build."
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create or update PR release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: ${{ steps.meta.outputs.body }}
          prerelease: true
          files: ./bundle/*
          target_commitish: ${{ github.event.pull_request.head.sha }}
