name: Auto add to project

# Adds new issues and PRs to the Galactic Trader Project board so they
# are visible without manual triage.

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  repository-projects: write
  issues: write
  pull-requests: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Add to Galactic Trader project
        uses: actions/add-to-project@v1
        with:
          project-url: https://github.com/users/ScottyVenable/projects/1
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
