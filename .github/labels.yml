# Label catalog. Apply with: gh label create / gh label edit.
# This file is read by .github/workflows/labels-sync.yml on a manual dispatch.

- name: "type:bug"
  color: "d73a4a"
  description: "Broken, incorrect, or regressed behaviour."
- name: "type:feature"
  color: "0e8a16"
  description: "New player-facing system, screen, mechanic, or workflow."
- name: "type:balance"
  color: "fbca04"
  description: "Economy, crew, travel, risk, reward, or pacing tuning."
- name: "type:content"
  color: "1d76db"
  description: "Authored game content: goods, races, modules, traits, events, lore."
- name: "type:chore"
  color: "c2e0c6"
  description: "Maintenance, cleanup, dependency, or refactor with no player-facing change."
- name: "type:docs"
  color: "0075ca"
  description: "Repository docs, wiki, guides, release notes, or contributor docs."
- name: "type:ci"
  color: "5319e7"
  description: "GitHub Actions, release automation, project automation, or checks."
- name: "type:mod"
  color: "a371f7"
  description: "Modding API, mod-loader, schemas, examples, or mod documentation."

- name: "area:economy"
  color: "bfd4f2"
  description: "Markets, prices, goods, supply, demand, news effects, or couriers."
- name: "area:crew"
  color: "bfd4f2"
  description: "Crew roles, traits, stress, energy frequency, hiring, or resting."
- name: "area:travel"
  color: "bfd4f2"
  description: "Routes, events, fuel, transit choices, hazards, or arrival flow."
- name: "area:ui"
  color: "bfd4f2"
  description: "Screens, layout, controls, mobile ergonomics, styling, or accessibility."
- name: "area:save"
  color: "bfd4f2"
  description: "Save/load, migrations, storage, abandon campaign, or compatibility."
- name: "area:mods"
  color: "bfd4f2"
  description: "Mod manifests, validation, data registry, examples, or compatibility."
- name: "area:ci"
  color: "bfd4f2"
  description: "Build, test, release, labels, project automation, or repository plumbing."
- name: "area:ship"
  color: "bfd4f2"
  description: "Ship modules, hardpoints, hull, cargo, drive, shield, sensor, or utility."
- name: "area:galaxy"
  color: "bfd4f2"
  description: "Galaxy generation, regions, systems, stations, factions, or station kinds."
- name: "area:lore"
  color: "bfd4f2"
  description: "Worldbuilding, civilisations, factions, storylines, or narrative canon."
- name: "area:community"
  color: "bfd4f2"
  description: "Discussions, wiki coordination, playtests, issue triage, or community ops."

- name: "priority:p0"
  color: "b60205"
  description: "Drop everything: release-blocking, data-loss, build-breaking, or critical play blocker."
- name: "priority:p1"
  color: "d93f0b"
  description: "High priority: milestone blocker or serious player/contributor impact."
- name: "priority:p2"
  color: "fbca04"
  description: "Normal priority: planned roadmap work or important polish."
- name: "priority:p3"
  color: "c2e0c6"
  description: "Low priority: backlog, nice-to-have, cleanup, or future candidate."

- name: "channel:development"
  color: "ededed"
  description: "Targets the development branch and dev build channel."
- name: "channel:alpha"
  color: "ededed"
  description: "Targets alpha promotion, playtest, pre-release, or alpha build work."
- name: "channel:stable"
  color: "ededed"
  description: "Targets main/stable release readiness or post-alpha release work."

- name: "release-bump:major"
  color: "ff7f50"
  description: "Release automation should treat this as a major version bump."
- name: "release-bump:minor"
  color: "ff7f50"
  description: "Release automation should treat this as a minor version bump."
- name: "release-bump:patch"
  color: "ff7f50"
  description: "Release automation should treat this as a patch version bump."

- name: "triage"
  color: "ededed"
  description: "Needs labels, priority, area, reproduction detail, or roadmap placement."
- name: "in-progress"
  color: "fbca04"
  description: "Work has started but is not yet ready for review."
- name: "blocked"
  color: "b60205"
  description: "Cannot proceed until a dependency, decision, permission, or upstream fix lands."
- name: "good first issue"
  color: "7057ff"
  description: "Scoped, documented, and suitable for a new contributor."
- name: "help wanted"
  color: "008672"
  description: "A contributor can pick this up without blocking core roadmap work."
- name: "question"
  color: "d876e3"
  description: "Needs clarification before implementation, triage, or prioritisation."
- name: "duplicate"
  color: "cfd3d7"
  description: "Tracks work already covered by another issue or pull request."
- name: "invalid"
  color: "e4e669"
  description: "Not actionable as filed or does not apply to this repository."
- name: "wontfix"
  color: "ffffff"
  description: "Intentionally not planned after triage or design decision."
