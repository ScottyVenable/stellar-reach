# Label catalog. Apply with: gh label create / gh label edit.
# This file is read by .github/workflows/labels-sync.yml on a manual dispatch.

- name: "type:bug"
  color: "d73a4a"
  description: "Something is broken or behaves incorrectly."
- name: "type:feature"
  color: "0e8a16"
  description: "A new system, screen, or mechanic."
- name: "type:balance"
  color: "fbca04"
  description: "Numeric or content tuning."
- name: "type:content"
  color: "1d76db"
  description: "New authored content (goods, races, modules, traits, events)."
- name: "type:chore"
  color: "c2e0c6"
  description: "Tooling, dependencies, refactors with no behaviour change."
- name: "type:docs"
  color: "0075ca"
  description: "Documentation only."
- name: "type:ci"
  color: "5319e7"
  description: "Workflows and automation."
- name: "type:mod"
  color: "a371f7"
  description: "Modding API or mod-loader work."
